  question: "Why does BCM High Availability (HA) not trigger an automatic failover if the power cable is pulled out of the active head node?"
  type: "single_choice"
  options:
    A: "The passive node cannot detect a power loss"
    B: "It is considered a graceful shutdown"
    C: "The BMC becomes unreachable, making head node termination status uncertain"
    D: "Failover only works for software crashes"
  correct_answer: "C"
  source_reference: "BCM11 Administration Manual"
  source_chapter: "High Availability"
