exam:
  name: "NVIDIA-Certified Professional: AI Operations (NCP-AIO) - Practice Set (120 Questions)"
  version: "2.0"
  questions:
    - id: 1
      domain: "AI Infrastructure"
      text: "You are sizing a cluster for training large language models using NVIDIA GPUs. Which factor is most critical for minimizing training time in multi-node distributed training?"
      type: "single_choice"
      options:
        A: "CPU core count per node"
        B: "RAM speed (MHz)"
        C: "Network bandwidth and latency between GPU nodes"
        D: "Local SSD capacity on each node"
      correct_answer: "C"
      explanation: "In multi-node distributed training, inter-node network bandwidth and latency are often the primary bottlenecks, because large tensors and gradients must be exchanged between GPUs in different servers. High-speed interconnects such as InfiniBand or RoCE are critical."

    - id: 2
      domain: "AI Infrastructure"
      text: "You want to partition an NVIDIA A100 GPU into multiple isolated GPU instances for different workloads. Which technology should you use?"
      type: "single_choice"
      options:
        A: "vGPU"
        B: "SR-IOV"
        C: "MIG"
        D: "NUMA"
      correct_answer: "C"
      explanation: "MIG (Multi-Instance GPU) allows a single A100 (and some other architectures) to be partitioned into multiple isolated GPU instances with dedicated compute and memory resources."

    - id: 3
      domain: "AI Infrastructure"
      text: "A team runs many small inference workloads that are latency-sensitive but use less than 5 GB GPU memory each. You have A100 40 GB GPUs available. What is the best approach to maximize GPU utilization?"
      type: "single_choice"
      options:
        A: "Assign one workload per physical GPU"
        B: "Use MIG to create multiple GPU instances and schedule each workload to a MIG slice"
        C: "Pin multiple processes to the same GPU without any partitioning"
        D: "Run all inference on CPUs to free GPUs for training"
      correct_answer: "B"
      explanation: "Using MIG to carve the A100 into several smaller instances (for example, 7×5 GB) lets you run multiple isolated workloads simultaneously, improving utilization and maintaining predictable performance."

    - id: 4
      domain: "AI Infrastructure"
      text: "Which storage characteristic is typically most important for training deep learning models with large datasets stored remotely?"
      type: "single_choice"
      options:
        A: "High IOPS with small random reads"
        B: "High sequential read throughput"
        C: "Low metadata lookup latency"
        D: "Support for object locking"
      correct_answer: "B"
      explanation: "Training deep learning models generally performs large sequential reads of batches of data. Sequential throughput is usually the key metric for performance."

    - id: 5
      domain: "AI Infrastructure"
      text: "You are designing a GPU cluster with NVIDIA GPUs for AI training. Which of the following best describes the benefit of NVLink within a single node?"
      type: "single_choice"
      options:
        A: "It replaces PCIe entirely for all communication"
        B: "It provides high-bandwidth, low-latency interconnect between GPUs in the same node"
        C: "It is only used for CPU-to-GPU communication"
        D: "It replaces the need for high-speed networking between nodes"
      correct_answer: "B"
      explanation: "NVLink provides a high-bandwidth, low-latency communication channel between GPUs within a node, improving scaling for multi-GPU workloads compared to PCIe alone."

    - id: 6
      domain: "AI Infrastructure"
      text: "Which command would you use on a Linux system to verify that NVIDIA GPUs are visible and healthy at a low level?"
      type: "single_choice"
      options:
        A: "lscpu"
        B: "nvidia-settings"
        C: "nvidia-smi"
        D: "lsblk"
      correct_answer: "C"
      explanation: "nvidia-smi is the standard CLI tool to inspect NVIDIA GPU presence, utilization, memory usage, temperatures, and driver versions on a host."

    - id: 7
      domain: "AI Infrastructure"
      text: "You observe that GPU utilization stays below 20% during training, while CPU utilization is high and disk I/O is saturated. What is the most likely bottleneck?"
      type: "single_choice"
      options:
        A: "GPU compute"
        B: "CPU compute or data preprocessing"
        C: "Network bandwidth"
        D: "GPU memory capacity"
      correct_answer: "B"
      explanation: "High CPU utilization and disk saturation with low GPU usage suggests the GPUs are starved for data, often due to CPU-side preprocessing or I/O limitations."

    - id: 8
      domain: "AI Infrastructure"
      text: "You need to provide multi-tenant access to GPUs in a virtualized environment for different teams. Which solution is most appropriate?"
      type: "single_choice"
      options:
        A: "Bare-metal only, one team per node"
        B: "NVIDIA vGPU with supported hypervisor"
        C: "CPU pinning and NUMA tuning"
        D: "SR-IOV on network cards only"
      correct_answer: "B"
      explanation: "NVIDIA vGPU enables sharing GPUs among VMs with isolation and quota control, making it suitable for multi-tenant environments."

    - id: 9
      domain: "AI Infrastructure"
      text: "A workload frequently runs out of GPU memory while the GPU utilization is low. What is usually the most effective way to address this?"
      type: "single_choice"
      options:
        A: "Increase number of CPU cores"
        B: "Reduce batch size"
        C: "Enable MIG on the GPU"
        D: "Disable ECC on the GPU"
      correct_answer: "B"
      explanation: "Reducing batch size directly reduces per-step memory usage and is the most common way to avoid OOM errors when training models on GPUs."

    - id: 10
      domain: "AI Infrastructure"
      text: "You are evaluating networking options for multi-node AI training. Which configuration generally offers the best performance for GPU-to-GPU communication across nodes?"
      type: "single_choice"
      options:
        A: "10 GbE with TCP"
        B: "25 GbE with standard NICs"
        C: "100 GbE/InfiniBand with RDMA support"
        D: "1 GbE bonded interfaces"
      correct_answer: "C"
      explanation: "100 GbE or InfiniBand with RDMA offers high bandwidth and low latency, which are crucial for efficient distributed GPU training."

    - id: 11
      domain: "AI Infrastructure"
      text: "Which NVIDIA technology helps manage GPU resources across multiple containers in a Kubernetes environment?"
      type: "single_choice"
      options:
        A: "NVIDIA NGC"
        B: "NVIDIA GPU Operator"
        C: "NVIDIA DALI"
        D: "NVIDIA Metropolis"
      correct_answer: "B"
      explanation: "The NVIDIA GPU Operator automates deployment and lifecycle management of NVIDIA drivers, container runtime, and other GPU components in Kubernetes."

    - id: 12
      domain: "AI Infrastructure"
      text: "You want to accelerate data preprocessing in an ETL pipeline feeding a training job. Which NVIDIA library is specifically designed for GPU-accelerated data loading and augmentation of images?"
      type: "single_choice"
      options:
        A: "cuDNN"
        B: "DALI"
        C: "NCCL"
        D: "TensorRT"
      correct_answer: "B"
      explanation: "NVIDIA DALI (Data Loading Library) provides GPU-accelerated data loading and preprocessing, especially for images and video."

    - id: 13
      domain: "AI Infrastructure"
      text: "What is the primary purpose of NCCL in multi-GPU training?"
      type: "single_choice"
      options:
        A: "Compiling CUDA kernels"
        B: "Accelerating matrix multiplications"
        C: "Providing communication primitives like all-reduce across GPUs"
        D: "Managing GPU drivers"
      correct_answer: "C"
      explanation: "NCCL (NVIDIA Collective Communications Library) provides optimized collective communication (all-reduce, broadcast, etc.) across multiple GPUs and nodes."

    - id: 14
      domain: "AI Infrastructure"
      text: "You have a single-node system with 8 GPUs, all connected with NVLink. Which configuration would best utilize the topology for data-parallel training?"
      type: "single_choice"
      options:
        A: "Use only 1 GPU to avoid communication overhead"
        B: "Use all 8 GPUs with a framework that supports NCCL for all-reduce"
        C: "Use 4 GPUs and leave the rest idle to reduce complexity"
        D: "Use 2 GPUs with CPU-based parameter server"
      correct_answer: "B"
      explanation: "Using all 8 GPUs and leveraging NCCL’s optimized collectives over NVLink will maximize throughput for data-parallel training."

    - id: 15
      domain: "AI Infrastructure"
      text: "Which statement best describes the role of CUDA in the NVIDIA AI stack?"
      type: "single_choice"
      options:
        A: "It is a GUI tool for managing GPUs"
        B: "It is a high-level deep learning framework like PyTorch"
        C: "It is a parallel computing platform and programming model for GPUs"
        D: "It is a virtualization technology for GPU sharing"
      correct_answer: "C"
      explanation: "CUDA is NVIDIA’s parallel computing platform and programming model that enables developers to write code that runs on NVIDIA GPUs."

    - id: 16
      domain: "Deployment & Operations"
      text: "You want to deploy GPU-accelerated workloads in Kubernetes. What is the primary requirement for the worker nodes?"
      type: "single_choice"
      options:
        A: "Nodes must be tainted to prevent non-GPU workloads"
        B: "Nodes must have NVIDIA GPUs and drivers installed"
        C: "Nodes must have at least 128 GB RAM"
        D: "Nodes must run only Ubuntu"
      correct_answer: "B"
      explanation: "Worker nodes must have NVIDIA GPUs and the appropriate drivers installed so Kubernetes can schedule and run GPU workloads."

    - id: 17
      domain: "Deployment & Operations"
      text: "Which Kubernetes resource type is used to request GPU resources for a pod?"
      type: "single_choice"
      options:
        A: "limits.cpu"
        B: "limits.nvidia.com/gpu or nvidia.com/gpu"
        C: "nodeSelector"
        D: "affinity"
      correct_answer: "B"
      explanation: "You request GPUs via the nvidia.com/gpu extended resource in the resources section of a pod spec, typically under limits."

    - id: 18
      domain: "Deployment & Operations"
      text: "In a Kubernetes cluster with NVIDIA GPU Operator installed, what is the role of the NVIDIA device plugin?"
      type: "single_choice"
      options:
        A: "It installs the GPU drivers on each node"
        B: "It exposes GPU resources to the Kubernetes scheduler"
        C: "It monitors GPU health and sends alerts"
        D: "It handles GPU firmware updates"
      correct_answer: "B"
      explanation: "The NVIDIA device plugin advertises GPU resources to Kubernetes so that the scheduler knows which nodes can run GPU workloads and allocates GPUs to pods."

    - id: 19
      domain: "Deployment & Operations"
      text: "You are using NVIDIA GPU Operator. Which components can it automate the deployment of?"
      type: "single_choice"
      options:
        A: "Only GPU drivers"
        B: "GPU drivers, NVIDIA Container Toolkit, and device plugin"
        C: "Only the NVIDIA device plugin"
        D: "Only monitoring tools like DCGM"
      correct_answer: "B"
      explanation: "The GPU Operator manages several components: GPU drivers, NVIDIA Container Toolkit, device plugin, and optionally monitoring components like DCGM."

    - id: 20
      domain: "Deployment & Operations"
      text: "You want to ensure that only certain pods can access GPUs in a shared Kubernetes cluster. Which approach is most appropriate?"
      type: "single_choice"
      options:
        A: "Use taints and tolerations on GPU nodes"
        B: "Disable GPU support in Kubernetes"
        C: "Limit GPU access using Namespace quotas and RBAC"
        D: "Run GPU workloads only on the control plane nodes"
      correct_answer: "C"
      explanation: "Resource quotas and RBAC at the namespace level can restrict which teams or pods can request GPU resources, providing fine-grained multi-tenant control."

    - id: 21
      domain: "Deployment & Operations"
      text: "You need to deploy an NVIDIA AI Enterprise container from NGC into your Kubernetes cluster. Which is the most secure way to handle registry authentication?"
      type: "single_choice"
      options:
        A: "Hard-code registry credentials in the pod spec"
        B: "Store credentials in a ConfigMap"
        C: "Use a Kubernetes Secret with an imagePullSecret reference"
        D: "Disable authentication on the registry"
      correct_answer: "C"
      explanation: "Kubernetes Secrets are the correct mechanism for storing registry credentials securely; pods reference them via imagePullSecrets."

    - id: 22
      domain: "Deployment & Operations"
      text: "You are deploying a TensorRT inference server container on Kubernetes. Which of the following is essential in the pod spec to ensure it can use GPU acceleration?"
      type: "single_choice"
      options:
        A: "privileged: true"
        B: "resources.limits.nvidia.com/gpu: '1' (or nvidia.com/gpu)"
        C: "hostNetwork: true"
        D: "restartPolicy: Never"
      correct_answer: "B"
      explanation: "The pod must request GPUs via the resources.limits field using the NVIDIA resource name so that Kubernetes schedules it onto a GPU node."

    - id: 23
      domain: "Deployment & Operations"
      text: "When using NGC containers, what is the main advantage over installing frameworks manually on the host?"
      type: "single_choice"
      options:
        A: "Lower GPU utilization"
        B: "Less memory usage on the GPU"
        C: "Pre-tested, optimized, and versioned software stacks"
        D: "They require no drivers on the host"
      correct_answer: "C"
      explanation: "NGC containers come with pre-built, optimized frameworks and libraries, tested for specific CUDA/driver versions, which simplifies deployment and compatibility management."

    - id: 24
      domain: "Deployment & Operations"
      text: "You want to perform a rolling upgrade of the NVIDIA GPU Operator in your production cluster. Which practice is most appropriate?"
      type: "single_choice"
      options:
        A: "Upgrade directly in production during peak hours"
        B: "Test the new version in a staging cluster mirroring production first"
        C: "Remove all GPU workloads before upgrading"
        D: "Upgrade only the device plugin, not the operator"
      correct_answer: "B"
      explanation: "Testing in staging that closely resembles production is a best practice before performing operator upgrades, to catch regressions and compatibility issues."

    - id: 25
      domain: "Deployment & Operations"
      text: "You suspect that GPU nodes in Kubernetes are not registering GPU resources. Which is the first component you should verify?"
      type: "single_choice"
      options:
        A: "The NVIDIA device plugin DaemonSet"
        B: "The CoreDNS pods"
        C: "The Ingress controller"
        D: "The cluster autoscaler"
      correct_answer: "A"
      explanation: "If GPU resources are missing, you should first check the NVIDIA device plugin DaemonSet on those nodes, since it is responsible for advertising GPUs to Kubernetes."

    - id: 26
      domain: "Deployment & Operations"
      text: "Which configuration is most appropriate for containerizing GPU workloads?"
      type: "single_choice"
      options:
        A: "Containers must run with full host privileges"
        B: "Containers run with the NVIDIA Container Toolkit configured as the runtime"
        C: "Containers must mount /dev/mem"
        D: "Containers should include GPU drivers inside the container"
      correct_answer: "B"
      explanation: "The NVIDIA Container Toolkit is used as the container runtime hook that exposes GPUs into containers, so you don’t need to install drivers in each container."

    - id: 27
      domain: "Deployment & Operations"
      text: "You need to schedule GPU workloads to specific nodes that have faster GPUs. Which Kubernetes construct is best suited?"
      type: "single_choice"
      options:
        A: "ConfigMap"
        B: "Node labels combined with nodeSelector or affinity"
        C: "Pod annotations"
        D: "Service type LoadBalancer"
      correct_answer: "B"
      explanation: "Apply labels to nodes (e.g., gpu-type=a100) and use nodeSelector or affinity rules in pod specs to schedule workloads to appropriate GPU nodes."

    - id: 28
      domain: "Deployment & Operations"
      text: "In a multi-tenant Kubernetes cluster using GPUs, you want to prevent resource fragmentation (for example, leaving unusable GPU fractions). Which strategy is most effective?"
      type: "single_choice"
      options:
        A: "Allow fractional GPU allocations"
        B: "Standardize pod GPU requests (e.g., always request 1 full GPU or a specific MIG profile)"
        C: "Use CPU overcommit"
        D: "Turn off GPU sharing entirely"
      correct_answer: "B"
      explanation: "Consistent standardization of GPU requests (such as 1 GPU or a predefined MIG profile) reduces fragmentation and improves bin packing for the scheduler."

    - id: 29
      domain: "Deployment & Operations"
      text: "You are running GPU workloads with Helm charts that depend on the GPU Operator. How should you ensure proper startup order?"
      type: "single_choice"
      options:
        A: "Use manual scripts to start everything in sequence"
        B: "Install GPU Operator first, then Helm charts that depend on GPUs"
        C: "Start application Helm charts first, then the operator"
        D: "It doesn’t matter"
      correct_answer: "B"
      explanation: "The GPU Operator should be deployed first so it can configure the nodes (drivers, runtime, device plugin). Then deploy workloads that assume those components are available."

    - id: 30
      domain: "Deployment & Operations"
      text: "Which is a good operational practice when pulling large NGC containers to many GPU nodes?"
      type: "single_choice"
      options:
        A: "Pull images directly on production nodes during peak hours"
        B: "Use an internal registry/cache to reduce external bandwidth usage"
        C: "Always pull images on-demand per pod"
        D: "Use latest tags for all images"
      correct_answer: "B"
      explanation: "Using an internal registry/cache for NGC images improves performance, reliability, and bandwidth utilization across the cluster."

    - id: 31
      domain: "Troubleshooting & Performance"
      text: "A training job is significantly slower after upgrading the NVIDIA driver and CUDA. What is the first step you should take?"
      type: "single_choice"
      options:
        A: "Immediately roll back the entire cluster"
        B: "Compare the framework and container versions with NVIDIA’s compatibility matrix"
        C: "Disable ECC on all GPUs"
        D: "Increase the batch size"
      correct_answer: "B"
      explanation: "Driver and CUDA upgrades must match the versions required by the deep learning framework/container. Checking the compatibility matrix and release notes is the first logical step."

    - id: 32
      domain: "Troubleshooting & Performance"
      text: "You see frequent GPU OOM errors shortly after a new model version was deployed. What is the most likely cause?"
      type: "single_choice"
      options:
        A: "A bug in the NVIDIA driver"
        B: "Increased model size or activation memory requirements"
        C: "Insufficient CPU cores"
        D: "Low disk space"
      correct_answer: "B"
      explanation: "A new model version may have more parameters or different architecture, increasing memory usage and causing OOMs on the same hardware."

    - id: 33
      domain: "Troubleshooting & Performance"
      text: "A user complains that their container cannot access GPUs in Kubernetes. You confirm that the node has GPUs and drivers. Which of the following would you check next?"
      type: "single_choice"
      options:
        A: "The pod’s resources.limits for nvidia.com/gpu"
        B: "The cluster DNS settings"
        C: "The node’s disk layout"
        D: "The pod’s environment variables"
      correct_answer: "A"
      explanation: "If the pod does not request nvidia.com/gpu in its resources.limits, Kubernetes will not allocate GPU devices to it, even if the node has GPUs."

    - id: 34
      domain: "Troubleshooting & Performance"
      text: "Your GPU training job scales well from 1 to 4 GPUs but shows diminishing returns from 4 to 8 GPUs in one node. Which is the most likely bottleneck?"
      type: "single_choice"
      options:
        A: "GPU compute"
        B: "CPU compute"
        C: "Inter-GPU communication overhead"
        D: "Disk capacity"
      correct_answer: "C"
      explanation: "As you add more GPUs, communication overhead (for example, gradient synchronization with all-reduce) grows. NVLink mitigates this, but communication can still become a bottleneck at high GPU counts."

    - id: 35
      domain: "Troubleshooting & Performance"
      text: "A node in your cluster shows no GPUs in nvidia-smi, while other nodes work fine. What is the first action you should take?"
      type: "single_choice"
      options:
        A: "Reboot the entire cluster"
        B: "Check the NVIDIA driver status or logs on that node"
        C: "Scale down all pods on that node"
        D: "Reset the Kubernetes control plane"
      correct_answer: "B"
      explanation: "If nvidia-smi cannot see GPUs, it suggests a driver or hardware issue on that node. Check driver services and system logs."

    - id: 36
      domain: "Troubleshooting & Performance"
      text: "You observe that GPU utilization for an inference service is low, but end-to-end latency is high. Which cause is most plausible?"
      type: "single_choice"
      options:
        A: "GPU is overloaded"
        B: "Input pre-processing or network overhead dominates latency"
        C: "GPU memory is too large"
        D: "Too many GPUs are allocated"
      correct_answer: "B"
      explanation: "Low GPU utilization with high latency typically means the GPU is waiting for data or requests — bottlenecks are often in pre-processing, network, or other non-GPU parts of the stack."

    - id: 37
      domain: "Troubleshooting & Performance"
      text: "GPU memory usage slowly increases over time for a long-running training job until OOM occurs. This is most likely due to:"
      type: "single_choice"
      options:
        A: "Hardware failure on the GPU"
        B: "Memory leak in the training script or framework usage"
        C: "Incompatible PCIe version"
        D: "Incorrect BIOS settings"
      correct_answer: "B"
      explanation: "A steady increase in GPU memory usage suggests a memory leak in code (e.g., storing tensors on GPU without freeing, retaining computation graphs unnecessarily)."

    - id: 38
      domain: "Troubleshooting & Performance"
      text: "A GPU node frequently becomes unresponsive, with high GPU temperatures reported before crashes. Which action is most appropriate?"
      type: "single_choice"
      options:
        A: "Reduce GPU clock speeds or power limit and improve cooling"
        B: "Disable all GPUs via BIOS"
        C: "Increase CPU overclocking"
        D: "Move workloads to CPUs"
      correct_answer: "A"
      explanation: "High temperatures suggest thermal issues. Mitigations include better cooling, reducing power limits, or lowering clocks to maintain safe operating temperatures."

    - id: 39
      domain: "Troubleshooting & Performance"
      text: "Your distributed training job across multiple nodes shows inconsistent step times, with some workers lagging behind. Which issue is this most likely to indicate?"
      type: "single_choice"
      options:
        A: "One or more straggler nodes due to resource contention or hardware issues"
        B: "Incorrect batch size"
        C: "Docker image corruption"
        D: "GPU driver version too new"
      correct_answer: "A"
      explanation: "Inconsistent step times with certain workers slower indicate straggler nodes, often due to CPU contention, disk or network issues, or degraded hardware."

    - id: 40
      domain: "Troubleshooting & Performance"
      text: "A user reports that they cannot pull an NGC container image due to authentication errors. You confirm credentials are correct. Which step is most appropriate next?"
      type: "single_choice"
      options:
        A: "Disable TLS verification"
        B: "Check if the user’s account has permissions for that NGC organization/project"
        C: "Reinstall Docker on all nodes"
        D: "Try a different GPU"
      correct_answer: "B"
      explanation: "Even with valid credentials, NGC uses project/organization-level access control. The user may not be authorized to pull that specific image."

    - id: 41
      domain: "Troubleshooting & Performance"
      text: "You see that nvidia-smi shows GPUs, but Kubernetes does not list nvidia.com/gpu on that node. Which component is most likely misconfigured?"
      type: "single_choice"
      options:
        A: "Kubernetes scheduler"
        B: "NVIDIA device plugin"
        C: "NVIDIA driver"
        D: "etcd"
      correct_answer: "B"
      explanation: "If the OS/driver sees GPUs but Kubernetes does not expose GPU resources, the device plugin is the likely culprit."

    - id: 42
      domain: "Troubleshooting & Performance"
      text: "Your inference throughput is lower than expected, even though GPUs are underutilized. Which optimization is most likely to help?"
      type: "single_choice"
      options:
        A: "Decreasing batch size to 1 for all requests"
        B: "Increasing batch size and enabling dynamic batching in the inference server"
        C: "Using CPUs for inference"
        D: "Limiting the number of model instances per GPU to 1"
      correct_answer: "B"
      explanation: "Larger batch sizes and dynamic batching (for example, in Triton Inference Server) help amortize overhead and improve GPU utilization, increasing throughput."

    - id: 43
      domain: "Troubleshooting & Performance"
      text: "After enabling MIG on a node, some existing pods requesting nvidia.com/gpu: 1 fail to schedule. Why?"
      type: "single_choice"
      options:
        A: "MIG must be disabled for Kubernetes"
        B: "The device plugin exposes MIG instances differently; pods must request MIG profiles or updated resource names"
        C: "MIG reduces total GPU memory to zero"
        D: "Kubernetes cannot run on MIG-enabled nodes"
      correct_answer: "B"
      explanation: "With MIG, GPUs are exposed as MIG instances with different resource names or counts, so pod specs may need to be updated to match those resources rather than full GPUs."

    - id: 44
      domain: "Troubleshooting & Performance"
      text: "A job’s GPU utilization is high but training loss decreases very slowly. From an operations perspective, which is the most appropriate first step?"
      type: "single_choice"
      options:
        A: "Tune the learning rate or model hyperparameters (in collaboration with ML team)"
        B: "Replace GPUs with newer models"
        C: "Increase GPU power limit"
        D: "Decrease node count"
      correct_answer: "A"
      explanation: "If utilization is high but model convergence is poor, this is typically a model or training configuration issue, not infrastructure. Operators should involve ML engineers."

    - id: 45
      domain: "Troubleshooting & Performance"
      text: "Users report intermittent failures with CUDA out-of-resources errors when multiple containers share a GPU. What is a practical mitigation?"
      type: "single_choice"
      options:
        A: "Disable multi-process service (MPS)"
        B: "Use MIG or assign one container per GPU with strict limits"
        C: "Lower GPU temperature thresholds"
        D: "Use smaller GPUs"
      correct_answer: "B"
      explanation: "Sharing GPUs can cause unpredictable memory contention. Using MIG (for supported GPUs) or scheduling one container per GPU with clear resource isolation reduces out-of-resource conflicts."

    - id: 46
      domain: "Monitoring & Capacity Management"
      text: "Which NVIDIA component provides metrics about GPU utilization, memory, temperature, and errors for monitoring systems?"
      type: "single_choice"
      options:
        A: "CUDA Toolkit"
        B: "NCCL"
        C: "DCGM (Data Center GPU Manager)"
        D: "TensorRT"
      correct_answer: "C"
      explanation: "NVIDIA DCGM is designed for monitoring and managing GPUs in data centers, exposing metrics that can be integrated with monitoring tools."

    - id: 47
      domain: "Monitoring & Capacity Management"
      text: "You want to visualize GPU utilization over time in a Kubernetes cluster. Which combination is most common?"
      type: "single_choice"
      options:
        A: "DCGM Exporter + Prometheus + Grafana"
        B: "CUDA Toolkit + top"
        C: "NGC + Docker logs"
        D: "BIOS logs + Excel"
      correct_answer: "A"
      explanation: "The typical stack is DCGM Exporter (for metrics) feeding Prometheus, with dashboards in Grafana."

    - id: 48
      domain: "Monitoring & Capacity Management"
      text: "You need to alert when any GPU’s temperature exceeds 85°C. Where is the best place to implement this?"
      type: "single_choice"
      options:
        A: "In each user’s training script"
        B: "BIOS"
        C: "Monitoring system (e.g., Prometheus alert rules on DCGM metrics)"
        D: "Kubernetes scheduler"
      correct_answer: "C"
      explanation: "Alerting should be centralized in the monitoring system, using metrics (for example, from DCGM) to trigger alerts when thresholds are exceeded."

    - id: 49
