- id: 1
  area: "Administration"
  question: "According to the Slurm key terms, what is the primary difference between a batch job and an interactive job?"
  type: "single_choice"
  options:
    A: "A batch job uses srun, while an interactive job uses sbatch."
    B: "A batch job returns immediately after submission, while an interactive job blocks until nodes are available to provide a pseudo-terminal."
    C: "Batch jobs can only run on login nodes, while interactive jobs must run on compute nodes."
    D: "Batch jobs require the -pty flag, whereas interactive jobs require a shell script."
  correct_answer: "B"
  source_reference: "NVIDIA DGX SuperPOD: Administration Guide"
  source_chapter: "Managing Slurm"
  source_pages: "N/A"
  explanation: "A batch job is submitted with a script using sbatch and returns immediately. An interactive job is submitted using srun (often with -pty) and blocks the terminal until the allocation is ready for real-time user interaction."

- id: 2
  area: "Administration"
  question: "In the output of the 'sinfo' command, what does the 'drng' state indicate for a compute node?"
  type: "single_choice"
  options:
    A: "The node is offline and cannot be contacted by the controller."
    B: "The node is online and available for new job allocations."
    C: "The node is currently running a job but has been marked to drain; it will not accept new jobs after completion."
    D: "The node is in the process of being rebooted by Slurm."
  correct_answer: "C"
  source_reference: "NVIDIA DGX SuperPOD: Administration Guide"
  source_chapter: "Managing Slurm"
  source_pages: "N/A"
  explanation: "The 'drng' or 'draining' state means the node has been marked to drain, but it is still finishing a currently allocated job. Once that job ends, the node will move to the 'drain' state."

