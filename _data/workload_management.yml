- id: 1
  area: "Workload management"
  question: "Which Slurm command is used to submit a job script for later execution, returning immediately and placing the job in the queue?"
  type: "single_choice"
  options:
    A: "srun"
    B: "salloc"
    C: "sbatch"
    D: "scontrol"
  correct_answer: "C"
