- id: 5
  area: "Installation and Deployment"
  question: "In a data center architecture optimized for AI workloads using a Beowulf cluster design, what is the primary purpose of implementing a secondary InfiniBand network alongside a standard Gigabit Ethernet network?"
  type: "single_choice"
  options:
    A: "To provide a redundant path for administrative SSH logins to the head node."
    B: "To serve as the primary gateway for the cluster's console and outside world access."
    C: "To provide high-performance, low-latency communication for large-scale computational problems involving the exchange of vast amounts of information."
    D: "To allow the head node to serve small configuration files to compute nodes more efficiently."
  correct_answer: "C"
  source_reference: "BCM11 User Manual"
  source_chapter: "Introduction"
  source_pages: "11"
  explanation: "AI and HPC applications benefit from InfiniBand's high data rates (e.g., 124Gbps) and extremely low latency (e.g., 1.2µs), which are necessary for the intensive message passing required in distributed parallel computations."